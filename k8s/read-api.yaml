apiVersion: v1
kind: Service
metadata:
  name: read-api
  namespace: cqrs-tp
spec:
  selector:
    app: read-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: read-api
  namespace: cqrs-tp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: read-api
  template:
    metadata:
      labels:
        app: read-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: nodemaster
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: wait-read-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z read-postgres 5432; do echo waiting for read-postgres; sleep 3; done
      containers:
        - name: read-api
          image: cqrs-spring:latest
          imagePullPolicy: Never
          env:
            - name: APP_NAME
              value: read-api
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0"
            - name: SERVER_PORT
              value: "8081"
            - name: READ_DATABASE_URL
              value: jdbc:postgresql://read-postgres:5432/read_db
            - name: READ_DATABASE_USERNAME
              value: cqrs
            - name: READ_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cqrs-secrets
                  key: postgres-password
          ports:
            - containerPort: 8081
              name: http
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20


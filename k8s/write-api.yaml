apiVersion: v1
kind: Service
metadata:
  name: write-api
  namespace: cqrs-tp
spec:
  selector:
    app.kubernetes.io/name: write-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: write-api-eu-west
  namespace: cqrs-tp
spec:
  selector:
    app.kubernetes.io/name: write-api
    demo.cqrs/region: eu-west
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: write-api-us-east
  namespace: cqrs-tp
spec:
  selector:
    app.kubernetes.io/name: write-api
    demo.cqrs/region: us-east
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: write-api-ap-south
  namespace: cqrs-tp
spec:
  selector:
    app.kubernetes.io/name: write-api
    demo.cqrs/region: ap-south
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: write-api
  namespace: cqrs-tp
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: write-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: write-api
    spec:
      serviceAccountName: cqrs-runtime
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: write-api
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: demo.cqrs/region
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: write-api
      initContainers:
        - name: resolve-node-region
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - /scripts/resolve-region.sh
          env:
            - name: APP_ROLE
              value: write-api
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: runtime-scripts
              mountPath: /scripts
            - name: cqrs-runtime
              mountPath: /cqrs-runtime
      containers:
        - name: write-api
          image: eclipse-temurin:21-jre-alpine
          command:
            - sh
            - -c
            - . /cqrs-runtime/env && java $JAVA_OPTS -jar /opt/app/write-api.jar
          env:
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0"
            - name: SERVER_PORT
              value: "8080"
            - name: WRITE_DATABASE_USERNAME
              value: cqrs
            - name: WRITE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cqrs-secrets
                  key: postgres-password
            - name: KAFKA_BROKERS
              value: kafka-bootstrap:9092
            - name: KAFKA_TOPIC
              value: product-events
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: app-artifacts
              mountPath: /opt/app
            - name: cqrs-runtime
              mountPath: /cqrs-runtime
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
      volumes:
        - name: app-artifacts
          hostPath:
            path: /tmp/cqrs-artifacts
            type: DirectoryOrCreate
        - name: cqrs-runtime
          emptyDir: {}
        - name: runtime-scripts
          configMap:
            name: cqrs-runtime-scripts
            defaultMode: 0555

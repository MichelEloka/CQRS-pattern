apiVersion: v1
kind: Service
metadata:
  name: write-api
  namespace: cqrs-tp
spec:
  selector:
    app: write-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: write-api
  namespace: cqrs-tp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: write-api
  template:
    metadata:
      labels:
        app: write-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: nodemaster
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: wait-write-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z write-postgres 5432; do echo waiting for write-postgres; sleep 3; done
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka-bootstrap 9092; do echo waiting for kafka; sleep 3; done
      containers:
        - name: write-api
          image: cqrs-spring:latest
          imagePullPolicy: Never
          env:
            - name: APP_NAME
              value: write-api
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0"
            - name: SERVER_PORT
              value: "8080"
            - name: WRITE_DATABASE_URL
              value: jdbc:postgresql://write-postgres:5432/write_db
            - name: WRITE_DATABASE_USERNAME
              value: cqrs
            - name: WRITE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cqrs-secrets
                  key: postgres-password
            - name: KAFKA_BROKERS
              value: kafka-bootstrap:9092
            - name: KAFKA_TOPIC
              value: product-events
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20

